global:
  image:
    repository: ghcr.io/mathisdlmr/argocd
    tag: "v3.3.3"

configs:
  params:
    server.insecure: "true"

  # Useful ressources : 
  # - https://argo-cd.readthedocs.io/en/stable/operator-manual/health/
  # - https://argo-cd.readthedocs.io/en/stable/user-guide/diffing/#system-level-configuration
  cm:
    # Ignorer l'absence d'IP LoadBalancer sur les Ingress
    resource.customizations.health.networking.k8s.io_Ingress: |
      hs = {}
      hs.status = "Healthy"
      hs.message = "Ingress is Healthy (LB IP check ignored)"
      return hs
    # Un cluster ES mono-node reste "yellow" en permanence (aucun 2e node pour les replica shards)
    resource.customizations.health.elasticsearch.k8s.elastic.co_Elasticsearch: |
      hs = {}
      if obj.status ~= nil and obj.status.health == "red" then
        hs.status = "Degraded"
        hs.message = "Elasticsearch cluster health is red"
      elseif obj.status ~= nil and obj.status.phase == "Ready" then
        hs.status = "Healthy"
        hs.message = "Elasticsearch is Ready (health=" .. (obj.status.health or "unknown") .. ")"
      else
        hs.status = "Progressing"
        hs.message = "Waiting for Elasticsearch to become Ready"
      end
      return hs
    # Ignorer les champs défaultés par la CRD ExternalSecret (sinon OutOfSync permanent)
    resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret: |
      jqPathExpressions:
        - .spec.data[]?.remoteRef.conversionStrategy
        - .spec.data[]?.remoteRef.decodingStrategy
        - .spec.data[]?.remoteRef.metadataPolicy
        - .spec.data[]?.remoteRef.nullBytePolicy
        - .spec.dataFrom[]?.find.conversionStrategy
        - .spec.dataFrom[]?.find.decodingStrategy
        - .spec.dataFrom[]?.find.nullBytePolicy
        - .spec.dataFrom[]?.extract.conversionStrategy
        - .spec.dataFrom[]?.extract.decodingStrategy
        - .spec.dataFrom[]?.extract.metadataPolicy
        - .spec.dataFrom[]?.extract.nullBytePolicy

controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

server:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  # ingress:
  #   enabled: true
  #   annotations:
  #     kubernetes.io/ingress.class: traefik
  #     traefik.ingress.kubernetes.io/router.tls: "true"
  #   hostname: argocd.mdlmr.fr

repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
