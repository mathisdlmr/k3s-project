fullnameOverride: kube-prometheus-stack

# CRDs installées par prometheus-operator-crds pour éviter le deadlock diff/CRD lors des bumps de chart
crds:
  enabled: false

defaultRules:
  create: true

prometheus:
  prometheusSpec:
    replicas: 1
    scrapeInterval: 30s
    evaluationInterval: 15s
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false
    walCompression: true
    enableFeatures:
      - auto-gomemlimit
      - memory-snapshot-on-shutdown
      - new-service-discovery-manager
      - remote-write-receiver
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          resources:
            requests:
              storage: 20Gi
    additionalScrapeConfigs:
      - job_name: 'k3s-server'
        static_configs:
          - targets: ['localhost:10250']
        scheme: https
        tls_config:
          insecure_skip_verify: true
      - job_name: 'k3s-controller-manager'
        static_configs:
          - targets: ['localhost:10257']
        scheme: https
        tls_config:
          insecure_skip_verify: true
      - job_name: 'k3s-scheduler'
        static_configs:
          - targets: ['localhost:10259']
        scheme: https
        tls_config:
          insecure_skip_verify: true
      - job_name: 'k3s-etcd'
        static_configs:
          - targets: ['localhost:2381']
        scheme: https
        tls_config:
          insecure_skip_verify: true
    resources:
      requests:
        memory: "768Mi"
        cpu: "100m"

grafana:
  defaultDashboardsTimezone: "Europe/Paris"
  admin:
    existingSecret: grafana-admin-secret
    existingSecretUserKey: admin-user
    existingSecretPasswordKey: admin-password
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/"
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
    - name: Tempo
      type: tempo
      url: http://tempo.monitoring.svc.cluster.local:3200
      access: proxy

prometheus-node-exporter:
  fullnameOverride: node-exporter
  prometheus:
    monitor:
      enabled: true
      relabelings:
        - action: replace
          regex: (.*)
          replacement: $1
          sourceLabels: ["__meta_kubernetes_pod_node_name"]
          targetLabel: kubernetes_node
kube-state-metrics:
  fullnameOverride: kube-state-metrics
  metricLabelsAllowlist:
    - pods=[*]
    - deployments=[*]
    - persistentvolumeclaims=[*]
  prometheus:
    monitor:
      enabled: true
      relabelings:
        - action: replace
          regex: (.*)
          replacement: $1
          sourceLabels: ["__meta_kubernetes_pod_node_name"]
          targetLabel: kubernetes_node

alertmanager:
  enabled: true
