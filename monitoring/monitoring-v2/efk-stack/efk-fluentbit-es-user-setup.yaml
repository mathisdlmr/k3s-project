apiVersion: batch/v1
kind: Job
metadata:
  name: efk-fluentbit-es-user-setup
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup-fluentbit-user
          image: curlimages/curl:8.10.1
          env:
            - name: ES_URL
              value: "https://efk-elasticsearch-es-http.monitoring-v2.svc:9200"
            - name: FLUENTBIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: efk-es-credentials
                  key: fluentbit_username
            - name: FLUENTBIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: efk-es-credentials
                  key: fluentbit_password
          volumeMounts:
            - name: elastic-user
              mountPath: /mnt/elastic-user
              readOnly: true
            - name: es-http-certs
              mountPath: /mnt/es-certs
              readOnly: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              ELASTIC_PASSWORD=$(cat /mnt/elastic-user/elastic)
 
              echo "Waiting for Elasticsearch..."
              i=0
              until curl -s -o /dev/null \
                  -w "%{http_code}" \
                  --cacert /mnt/es-certs/ca.crt \
                  -u "elastic:${ELASTIC_PASSWORD}" \
                  "${ES_URL}/_cluster/health" | grep -q "200"; do
                i=$((i+1))
                if [ "$i" -ge 30 ]; then
                  echo "Elasticsearch unreachable after 30 attempts" >&2
                  exit 1
                fi
                echo "Elasticsearch still not ready, attempt $i/30..."
                sleep 10
              done
              echo "Elasticsearch is up !"
 
              echo "Creating/updating role fluentbit_writer..."
              curl -sf --cacert /mnt/es-certs/ca.crt -u "elastic:${ELASTIC_PASSWORD}" \
                -X PUT "${ES_URL}/_security/role/fluentbit_writer" \
                -H 'Content-Type: application/json' \
                -d '{
                  "cluster": ["monitor"],
                  "indices": [
                    {
                      "names": ["fluent-bit-*", "logs-*"],
                      "privileges": ["create_index","create","create_doc","index","manage","view_index_metadata","auto_configure"]
                    }
                  ]
                }'
 
              echo "Creating/updating user ${FLUENTBIT_USERNAME}..."
              curl -sf --cacert /mnt/es-certs/ca.crt -u "elastic:${ELASTIC_PASSWORD}" \
                -X POST "${ES_URL}/_security/user/${FLUENTBIT_USERNAME}" \
                -H 'Content-Type: application/json' \
                -d "{\"password\": \"${FLUENTBIT_PASSWORD}\", \"roles\": [\"fluentbit_writer\"], \"full_name\": \"Fluent Bit\"}"
 
              echo "Fluent Bit user setup completed successfully !"
      volumes:
        - name: elastic-user
          secret:
            secretName: efk-elasticsearch-es-elastic-user
        - name: es-http-certs
          secret:
            secretName: efk-elasticsearch-es-http-certs-public
