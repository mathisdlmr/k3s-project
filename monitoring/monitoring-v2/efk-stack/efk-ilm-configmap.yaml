apiVersion: v1
kind: ConfigMap
metadata:
  name: ilm-and-index-template-config
data:
  ilm-policy.json: |
    {
        "policy": {
            "phases": {
                "hot": {
                    "min_age": "0ms",
                    "actions": {
                        "rollover": {
                            "max_age": "7d",
                            "max_size":"50gb",
                            "max_docs": 10000000
                        },
                        "set_priority": {
                            "priority": 50
                        }
                    }
                },
                "warm": {
                    "min_age": "3d",
                    "shrink": {"number_of_shards": 1},
                    "forcemerge": {"max_num_segments": 1},
                    "actions": {
                        "set_priority": {
                            "priority": 25
                        }
                    }
                },
                "cold": {
                    "min_age": "7d",
                    "actions": {
                        "freeze": {},
                        "set_priority": {
                            "priority": 0
                        }
                    }
                },
                "delete": {
                    "min_age": "30d",
                    "actions": {
                        "delete": {}
                    }
                }
            }
        }
    }
  index-template.json: |
    {
      "index_patterns": ["logs-*"],
      "data_stream": {},
      "template": {
        "settings": {
          "number_of_shards": 1,
          "number_of_replicas": 1,
          "index.lifecycle.name": "my-ilm-policy"
        }
      }
    }