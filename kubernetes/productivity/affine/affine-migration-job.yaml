apiVersion: batch/v1
kind: Job
metadata:
  name: affine-migration
  namespace: affine
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z affine-postgres 5432; do
                echo "Waiting for postgres..."; sleep 2;
              done
        - name: wait-for-redis
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z affine-redis 6379; do
                echo "Waiting for redis..."; sleep 2;
              done
      containers:
        - name: affine-migration
          image: ghcr.io/toeverything/affine:stable
          command: ["sh", "-c", "node ./scripts/self-host-predeploy.js"]
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: affine-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: affine-secret
                  key: DB_PASSWORD
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: affine-secret
                  key: DB_DATABASE
            - name: DATABASE_URL
              value: "postgresql://$(DB_USERNAME):$(DB_PASSWORD)@affine-postgres:5432/$(DB_DATABASE)"
            - name: REDIS_SERVER_HOST
              value: affine-redis
            - name: AFFINE_INDEXER_ENABLED
              value: "false"
