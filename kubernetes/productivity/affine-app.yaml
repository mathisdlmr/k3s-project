apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: affine
  namespace: argocd
  labels:
    argocd.argoproj.io/instance: productivity
    app.kubernetes.io/part-of: productivity
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: productivity
  destination:
    server: https://kubernetes.default.svc
    namespace: affine
  source:
    repoURL: https://github.com/mathisDlmr/k3s-project.git
    targetRevision: main
    path: kubernetes/productivity/affine/
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
