Kubernetes: true

operator:
  enable: true
  resources:
    limits:
      cpu: 50m
      memory: 50Mi
    requests:
      cpu: 10m
      memory: 20Mi

fluentbit:
  enable: true
  resources:
    limits:
      cpu: 100m
      memory: 100Mi
    requests:
      cpu: 10m
      memory: 25Mi
  additionalVolumes:
    - name: es-ca-cert
      secret:
        secretName: efk-elasticsearch-es-http-certs-public
  additionalVolumesMounts:
    - name: es-ca-cert
      mountPath: /fluent-bit/es-certs
      readOnly: true

fluentd:
  enable: false