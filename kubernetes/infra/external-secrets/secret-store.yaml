# Online tutorial : https://external-secrets.io/latest/provider/infisical/
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical
spec:
  provider:
    infisical:
      hostAPI: https://eu.infisical.com
      auth:
        universalAuthCredentials:
          clientId:
            name: infisical-universal-auth-credentials
            namespace: infra
            key: clientId
          clientSecret:
            name: infisical-universal-auth-credentials
            namespace: infra
            key: clientSecret
      secretsScope:
        projectSlug: k3s-project-zyd-6
        environmentSlug: prod
        secretsPath: "/"
        recursive: true