apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mdlmr-fr-wildcard
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  secretName: mdlmr-fr-wildcard-tls
  issuerRef:
    name: cluster-issuer
    kind: ClusterIssuer
  commonName: "*.mdlmr.fr"
  dnsNames:
    - "mdlmr.fr"
    - "*.mdlmr.fr"
