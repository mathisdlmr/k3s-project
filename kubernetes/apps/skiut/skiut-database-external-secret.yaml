apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: skiut-database
  namespace: skiut
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: skiut-database-secret
    creationPolicy: Owner
  dataFrom:
    - find:
        path: /skiut/database
        name:
          regexp: ".*"
