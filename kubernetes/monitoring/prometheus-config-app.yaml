apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-config
  namespace: argocd
  labels:
    argocd.argoproj.io/instance: monitoring
    app.kubernetes.io/part-of: monitoring
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
    # - repoURL: 'https://github.com/mathisDlmr/k3s-project.git'
    #   targetRevision: main
    #   path: kubernetes/monitoring/metrics/alert-manager/
    - repoURL: https://github.com/mathisDlmr/k3s-project.git
      targetRevision: main
      path: kubernetes/monitoring/kube-prometheus-stack/rules/
    - repoURL: https://github.com/mathisDlmr/k3s-project.git
      targetRevision: main
      path: kubernetes/monitoring/kube-prometheus-stack/service-monitors/
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
