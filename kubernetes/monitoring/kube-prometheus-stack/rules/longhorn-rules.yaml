apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: longhorn-rules
  labels:
    role: alert-rules
spec:
  groups:
    - name: longhorn.rules
      rules:
        # robustness : 0=unknown, 1=healthy, 2=degraded, 3=faulted
        - alert: LonghornVolumeFaulted
          expr: longhorn_volume_robustness == 3
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Volume Longhorn {{ $labels.volume }} en état Faulted"
            description: "Le volume {{ $labels.volume }} (node {{ $labels.node }}) n'a plus aucun réplica fonctionnel."

        - alert: LonghornVolumeDegraded
          expr: longhorn_volume_robustness == 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Volume Longhorn {{ $labels.volume }} dégradé depuis 10min"
            description: "Le volume {{ $labels.volume }} a perdu au moins un réplica (node down ou rebuild en cours)."

        - alert: LonghornVolumeSpaceLow
          expr: (longhorn_volume_actual_size_bytes / longhorn_volume_capacity_bytes) * 100 > 90
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Volume Longhorn {{ $labels.volume }} rempli à plus de 90%"

        - alert: LonghornNodeStorageLow
          expr: (longhorn_node_storage_usage_bytes / longhorn_node_storage_capacity_bytes) * 100 > 75
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Stockage Longhorn du node {{ $labels.node }} utilisé à plus de 75%"

        - alert: LonghornNodeDown
          expr: longhorn_node_status{condition="ready"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node Longhorn {{ $labels.node }} down"
            description: "Le node {{ $labels.node }} n'est plus Ready côté Longhorn : ses réplicas ne sont plus synchronisés."
