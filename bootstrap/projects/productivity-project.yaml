apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: productivity
  namespace: argocd
spec:
  sourceRepos:
    - https://github.com/mathisDlmr/k3s-project.git
  destinations:
    - name: "*"
      namespace: argocd
      server: "*"
    - name: "*"
      namespace: productivity
      server: "*"
    - name: "*"
      namespace: affine
      server: "*"
  clusterResourceWhitelist: []
