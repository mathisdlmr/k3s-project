apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
spec:
  sourceRepos:
    - https://github.com/mathisDlmr/k3s-project.git
    - https://github.com/mathisdlmr/sr05-projet.git
  destinations:
    - name: "*"
      namespace: argocd
      server: "*"
    - name: "*"
      namespace: skiut
      server: "*"
    - name: "*"
      namespace: website
      server: "*"
    - name: "*"
      namespace: werewolf
      server: "*"
  clusterResourceWhitelist: []
