# roles/common/tasks/kernel.yml
# Define customs kernel settings

- name: Disable swap (k3s doesn't know how to deal with it)
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb > 0
  changed_when: true

- name: Also disable swarp on /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '#\1'

- name: Charge kernel modules br_netfilter and overlay
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - br_netfilter
    - overlay

- name: Keep br_netfilter and overlay at restart
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s.conf
    content: |
      br_netfilter
      overlay
    mode: "0644"

- name: Configure sysctl net-configuration for k3s
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: true
  loop:
    - { name: net.bridge.bridge-nf-call-iptables, value: "1" }
    - { name: net.ipv4.ip_forward, value: "1" }

- name: Configure inotify limits for log collection
  ansible.posix.sysctl:
    name: "{{ item.names }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-k3s.conf
    reload: true
  loop:
    - { name: fs.inotify.max_user_watches, value: "524288" }
    - { name: fs.inotify.max_user_instances, value: "512" }
    - { name: fs.inotify.max_queued_events, value: "65536" }
